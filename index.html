<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Ray Промышленная Установка</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; }
        model-viewer { width: 100%; height: 80vh; background-color: #1a1a1a; }
        .controls { padding: 20px; text-align: center; }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
        .active { background: #ff4500; }
    </style>
</head>
<body>

    <model-viewer 
        id="xray-model"
        src="model.glb" 
        ar 
        camera-controls 
        shadow-intensity="1" 
        exposure="1"
        environment-image="neutral">
    </model-viewer>

    <div class="controls">
        <button id="xray-btn">Включить рентген (X-Ray)</button>
    </div>

    <script>
        const modelViewer = document.querySelector('#xray-model');
        const btn = document.querySelector('#xray-btn');
        let isXray = false;

        btn.addEventListener('click', () => {
            isXray = !isXray;
            
            // Получаем все материалы модели
            const materials = modelViewer.model.materials;

            materials.forEach((material) => {
                // Если это внешний корпус (ищем по имени из Blender)
                if (material.name === 'Body_Outer_Material') {
                    if (isXray) {
                        material.setAlphaMode("BLEND");
                        material.pbrMetallicRoughness.setBaseColorFactor([0.5, 0.5, 0.5, 0.2]); // 0.2 - прозрачность
                    } else {
                        material.setAlphaMode("OPAQUE");
                        material.pbrMetallicRoughness.setBaseColorFactor([1, 1, 1, 1]); // Возвращаем металл
                    }
                }

                // Если это внутренности — заставляем их светиться
                if (material.name === 'Internal_Material') {
                    if (isXray) {
                        // Включаем свечение (эмиссию) [R, G, B]
                        material.setEmissiveFactor([1, 0.3, 0]); // Оранжевый огонь
                    } else {
                        material.setEmissiveFactor([0, 0, 0]); // Выключаем свет
                    }
                }
            });

            // Меняем текст кнопки
            btn.textContent = isXray ? "Выключить рентген" : "Включить рентген";
            btn.classList.toggle('active');
        });
    </script>
</body>
</html>
