<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Технологии Газоочистки</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
:root { --accent: #00a8ff; }

body {
    margin: 0;
    background: #121212;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    color: white;
}

model-viewer {
    width: 100vw;
    height: 100vh;
    background: #121212;
}

/* TOP BAR */
.top-bar {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 200;
}

.tab-btn, .lang-btn {
    padding: 8px 14px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    transition: 0.3s;
}

.tab-btn.active, .lang-btn.active {
    background: rgba(255,255,255,0.2);
    color: white;
}

/* CONTROLS */
.controls {
    position: absolute;
    bottom: 30px;
    left: 30px;
    display: flex;
    gap: 10px;
    z-index: 100;
}

.controls button {
    padding: 10px 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
}

/* TABS */
.tab { display: none; width:100vw; height:100vh; }
.tab.active { display: block; }

/* INFO PANEL */
#info-panel {
    position: absolute;
    top: 100px;
    left: 30px;
    width: 360px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);
    border-radius: 14px;
    padding: 20px;

    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
}

#info-panel.active {
    opacity: 1;
    transform: translateY(0);
}

#info-panel h2 {
    margin: 0 0 10px;
    color: var(--accent);
}

/* HOTSPOTS */
.Hotspot {
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid #fff;
    cursor: pointer;
}

/* INFO PAGE */
.info-page {
    padding: 120px 60px;
    max-width: 800px;
    line-height: 1.7;
}
</style>
</head>

<body>

<div class="top-bar">
    <div>
        <button class="tab-btn active" onclick="openTab('viewer', this)">3D</button>
        <button class="tab-btn" onclick="openTab('infoTab', this)">Инфо</button>
    </div>

    <div>
        <button class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('kz')">KZ</button>
    </div>
</div>

<div id="viewer" class="tab active">

<model-viewer id="viewer3d" src="my_model.glb" camera-controls auto-rotate>

    <!-- ВСЕ ТВОИ HOTSPOTS -->
    <button class="Hotspot" slot="hotspot-8" data-position="0.5644m 1.8532m 18.3852m" onmouseover="showData(8)" onmouseout="hideInfo()"></button>
    <button class="Hotspot" slot="hotspot-9" data-position="11.1544m 4.0896m 14.5385m" onmouseover="showData(9)" onmouseout="hideInfo()"></button>
    <button class="Hotspot" slot="hotspot-10" data-position="22.2750m 4.0559m 17.3067m" onmouseover="showData(10)" onmouseout="hideInfo()"></button>
    <button class="Hotspot" slot="hotspot-11" data-position="30.9266m 4.4094m 15.5866m" onmouseover="showData(11)" onmouseout="hideInfo()"></button>
    <button class="Hotspot" slot="hotspot-12" data-position="38.7348m 1.9256m 14.6947m" onmouseover="showData(12)" onmouseout="hideInfo()"></button>
    <button class="Hotspot" slot="hotspot-13" data-position="45.1935m 13.1032m 15.1441m" onmouseover="showData(13)" onmouseout="hideInfo()"></button>

</model-viewer>

<div id="info-panel">
    <h2 id="info-title">Загрузка...</h2>
    <p id="info-text"></p>
</div>

</div>

<div id="infoTab" class="tab">
    <div class="info-page">
        <h1>Система газоочистки</h1>
        <p>Полное описание технологии, этапов очистки и экологических преимуществ.</p>
    </div>
</div>

<div class="controls">
    <button onclick="toggleXray()">X-ray</button>
</div>

<script>
let currentLang = 'ru';
let xray = false;

const content = {
ru: {
8: { t: "Металлургическая печь", d: "Основной теплотехнический агрегат, где происходит плавление металла. В процессе образуются загрязнённые газы." },
9: { t: "Циклонный сепаратор", d: "Первая ступень очистки, удаляет крупную пыль." },
10: { t: "Рукавный фильтр", d: "Удаляет до 99.9% мелкой пыли." },
11: { t: "Скруббер", d: "Очищает газ жидкостью от вредных примесей." },
12: { t: "Плазменный реактор", d: "Разрушает токсичные соединения." },
13: { t: "Дымовая труба", d: "Выводит очищенный газ в атмосферу." }
},
kz: {
8: { t: "Металлургиялық пеш", d: "Металл балқыту агрегаты." },
9: { t: "Циклондық сепаратор", d: "Ірі шаңды жояды." },
10: { t: "Жеңді сүзгі", d: "Ұсақ шаңды ұстайды." },
11: { t: "Скруббер", d: "Газды сұйықтықпен тазалайды." },
12: { t: "Плазмалық реактор", d: "Улы қосылыстарды жояды." },
13: { t: "Түтін мұржасы", d: "Тазартылған газды шығарады." }
}
};

function openTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
    });
}

function showData(id) {
    const item = content[currentLang][id];
    document.getElementById('info-title').innerText = item.t;
    document.getElementById('info-text').innerText = item.d;
    document.getElementById('info-panel').classList.add('active');
}

function hideInfo() {
    document.getElementById('info-panel').classList.remove('active');
}

function toggleXray() {
    const viewer = document.getElementById('viewer3d');
    xray = !xray;
    viewer.style.transition = "0.4s";
    viewer.style.filter = xray ? "brightness(1.3) contrast(0.7) opacity(0.6)" : "none";
}
</script>

</body>
</html>
