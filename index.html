<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Технологии Газоочистки</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --accent: #00a8ff; }
        body { margin: 0; background: #121212; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; color: white; }
        
        model-viewer { width: 100vw; height: 100vh; background-color: #121212; }

        /* Переключатель языков */
        .lang-switcher {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 8px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        .lang-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        /* Инфо-панель (хотспоты) */
        #info-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 380px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(15px);
            border-left: 5px solid var(--accent);
            padding: 25px;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 10;
        }

        #info-panel.active { opacity: 1; transform: translateX(0); }
        #info-panel h2 { margin: 0 0 12px 0; font-size: 20px; color: var(--accent); letter-spacing: 1px; }
        #info-panel p { margin: 0; font-size: 15px; line-height: 1.7; color: #e0e0e0; text-align: justify; }

        /* Нижняя панель управления */
        .bottom-controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid var(--accent);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            font-weight: 500;
        }

        .control-btn:hover { background: var(--accent); color: white; }
        .control-btn.active { background: #ff4500; border-color: #ff4500; }

        /* Модальное окно "О проекте" */
        #about-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            border: 1px solid var(--accent);
            text-align: center;
        }

        .modal-content button { margin-top: 20px; }

        /* Хотспоты */
        .Hotspot {
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid #fff;
            width: 18px;
            height: 18px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.8);
            transition: transform 0.3s ease;
        }
        .Hotspot:hover { transform: scale(1.6); background: #fff; }

        #ar-button { background: #fff; border-radius: 20px; border: none; padding: 12px 24px; position: absolute; bottom: 30px; right: 30px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('kz')">KZ</button>
    </div>

    <div id="info-panel">
        <h2 id="info-title">Загрузка...</h2>
        <p id="info-text">Выберите объект на модели для просмотра подробных характеристик.</p>
    </div>

    <div class="bottom-controls">
        <button class="control-btn" onclick="toggleXray()" id="xray-btn">X-RAY РЕЖИМ</button>
        <button class="control-btn" onclick="toggleAbout()">О ПРОЕКТЕ</button>
    </div>

    <div id="about-modal" onclick="toggleAbout()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="about-title">О проекте</h2>
            <p id="about-desc">Данная 3D-визуализация демонстрирует современные системы газоочистки в металлургии. Вы можете изучить каждый узел и посмотреть внутреннее устройство систем.</p>
            <button class="control-btn" onclick="toggleAbout()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <model-viewer id="main-model" src="my_model.glb" ar camera-controls tone-mapping="neutral" shadow-intensity="2" auto-rotate>

        <button class="Hotspot" slot="hotspot-8" data-position="0.5644m 1.8532m 18.3852m" data-normal="0m 0m 1m" onmouseover="showData(8)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-9" data-position="11.1544m 4.0896m 14.5385m" data-normal="0.0958m -0.2075m 0.9735m" onmouseover="showData(9)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-10" data-position="22.2750m 4.0559m 17.3067m" data-normal="0m 0m 1m" onmouseover="showData(10)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-11" data-position="30.9266m 4.4094m 15.5866m" data-normal="-0.0980m 0m 0.9951m" onmouseover="showData(11)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-12" data-position="38.7348m 1.9256m 14.6947m" data-normal="-0.0157m -0.4366m 0.8994m" onmouseover="showData(12)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-13" data-position="45.1935m 13.1032m 15.1441m" data-normal="-0.0979m 0.0204m 0.9949m" onmouseover="showData(13)" onmouseout="hideInfo()"></button>

        <button slot="ar-button" id="ar-button">AR РЕЖИМ</button>
    </model-viewer>

    <script>
        let currentLang = 'ru';
        let xrayEnabled = false;

        const content = {
            ru: {
                8: { t: "Металлургическая печь", d: "Основной теплотехнический агрегат, где происходит плавление металла..." },
                9: { t: "Циклонный сепаратор", d: "Первая ступень сухой очистки. Газовый поток закручивается внутри конуса..." },
                10: { t: "Рукавный фильтр (Baghouse)", d: "Аппарат для тонкой механической очистки..." },
                11: { t: "Скруббер (Мокрая очистка)", d: "Аппарат, в котором газ промывается жидкостью..." },
                12: { t: "Плазменный реактор", d: "Инновационная установка финишной очистки..." },
                13: { t: "Дымовая труба", d: "Финальное звено системы..." },
                aboutT: "О проекте",
                aboutD: "Интерактивная 3D-модель промышленного комплекса газоочистки. Используйте X-Ray для просмотра внутренних компонентов."
            },
            kz: {
                8: { t: "Металлургиялық пеш", d: "Металл балқытылатын негізгі жылу техникалық агрегат..." },
                // ... (оставь свой текст для KZ здесь)
                aboutT: "Жоба туралы",
                aboutD: "Газды тазарту өнеркәсіптік кешенінің интерактивті 3D моделі. Ішкі компоненттерді көру үшін X-Ray функциясын қолданыңыз."
            }
        };

        const panel = document.getElementById('info-panel');
        const title = document.getElementById('info-title');
        const text = document.getElementById('info-text');
        const modelViewer = document.querySelector('#main-model');

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
            });
            document.getElementById('about-title').innerText = content[lang].aboutT;
            document.getElementById('about-desc').innerText = content[lang].aboutD;
            hideInfo();
        }

        function showData(id) {
            const item = content[currentLang][id];
            title.innerText = item.t;
            text.innerText = item.d;
            panel.classList.add('active');
        }

        function hideInfo() { panel.classList.remove('active'); }

        function toggleAbout() {
            const modal = document.getElementById('about-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // Логика X-RAY
        function toggleXray() {
            xrayEnabled = !xrayEnabled;
            const btn = document.getElementById('xray-btn');
            const materials = modelViewer.model.materials;

            materials.forEach(mat => {
                // Если в имени материала есть 'Outer' или 'Shell' (или просто ко всем внешним)
                // ВАЖНО: замени 'Body' на имя своего материала корпуса из Blender
                if (mat.name.includes('Body') || mat.name.includes('Outer')) {
                    mat.setAlphaMode(xrayEnabled ? "BLEND" : "OPAQUE");
                    mat.pbrMetallicRoughness.setBaseColorFactor(xrayEnabled ? [1, 1, 1, 0.2] : [1, 1, 1, 1]);
                }
                
                // Если есть светящиеся части
                if (mat.name.includes('Glow') || mat.name.includes('Inner')) {
                    mat.setEmissiveFactor(xrayEnabled ? [0, 0.6, 1] : [0, 0, 0]);
                }
            });

            btn.classList.toggle('active', xrayEnabled);
            btn.innerText = xrayEnabled ? "ВЫКЛЮЧИТЬ X-RAY" : "X-RAY РЕЖИМ";
        }
    </script>
</body>
</html>
