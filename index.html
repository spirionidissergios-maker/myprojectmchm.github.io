<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Технологии Газоочистки | МЧМ-2024</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --accent: #00a8ff; --bg: #121212; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: white; }
        
        model-viewer { width: 100vw; height: 100vh; background-color: var(--bg); }

        /* Переключатель языков */
        .lang-switcher {
            position: absolute; top: 25px; right: 25px; z-index: 100;
            display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px;
        }
        .lang-btn {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 6px 14px; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        /* Инфо-панель хотспотов */
        #info-panel {
            position: absolute; top: 30px; left: 30px; width: 350px;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px);
            border-left: 5px solid var(--accent); padding: 20px; border-radius: 0 12px 12px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); opacity: 0; transform: translateX(-30px);
            transition: 0.4s; pointer-events: none; z-index: 10;
        }
        #info-panel.active { opacity: 1; transform: translateX(0); }
        #info-panel h2 { margin: 0 0 10px 0; font-size: 18px; color: var(--accent); }
        #info-panel p { margin: 0; font-size: 14px; line-height: 1.6; color: #ccc; }

        /* Кнопки управления */
        .bottom-controls { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 12px; z-index: 100; }
        .control-btn {
            background: rgba(30, 30, 30, 0.8); border: 1px solid var(--accent);
            color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }
        .control-btn:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .control-btn.active { background: #ff4500; border-color: #ff4500; }

        /* Модальное окно "О проекте" */
        #about-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #1e1e1e; padding: 40px; border-radius: 15px;
            max-width: 800px; max-height: 80vh; overflow-y: auto;
            border: 1px solid var(--accent); position: relative;
        }
        .modal-content h2 { color: var(--accent); margin-top: 0; }
        .modal-content h3 { color: var(--accent); font-size: 1.1em; margin-top: 20px; }
        .modal-content p, .modal-content li { color: #ddd; line-height: 1.6; font-size: 15px; text-align: left; }
        .close-modal { position: sticky; bottom: 0; width: 100%; margin-top: 20px; }

        /* Хотспоты */
        .Hotspot {
            background: var(--accent); border-radius: 50%; border: 2px solid #fff;
            width: 20px; height: 20px; cursor: pointer; box-shadow: 0 0 15px var(--accent);
        }

        #ar-button { background: #fff; border-radius: 20px; border: none; padding: 10px 20px; position: absolute; bottom: 30px; right: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('kz')">KZ</button>
    </div>

    <div id="info-panel">
        <h2 id="info-title">Объект</h2>
        <p id="info-text">Наведите на точку</p>
    </div>

    <div class="bottom-controls">
        <button class="control-btn" onclick="toggleXray()" id="xray-btn">Рентген (X-Ray)</button>
        <button class="control-btn" onclick="toggleAbout()">О проекте</button>
    </div>

    <div id="about-modal">
        <div class="modal-content">
            <div id="about-text-content">
                </div>
            <button class="control-btn close-modal" onclick="toggleAbout()">Закрыть</button>
        </div>
    </div>

    <model-viewer id="main-model" src="my_model.glb" ar camera-controls shadow-intensity="2" auto-rotate>
        <button class="Hotspot" slot="hotspot-8" data-position="0.5644m 1.8532m 18.3852m" onmouseover="showData(8)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-9" data-position="11.1544m 4.0896m 14.5385m" onmouseover="showData(9)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-10" data-position="22.2750m 4.0559m 17.3067m" onmouseover="showData(10)" onmouseout="hideInfo()"></button>
        <button slot="ar-button" id="ar-button">AR РЕЖИМ</button>
    </model-viewer>

    <script>
        let currentLang = 'ru';
        let xrayEnabled = false;

        const content = {
            ru: {
                8: { t: "Печь", d: "Металлургическая печь МЧМ-2024. Источник первичного загрязнения." },
                9: { t: "Циклон", d: "Центробежная очистка от крупных частиц пыли." },
                10: { t: "Рукавный фильтр", d: "Тонкая очистка ткани от мелкодисперсной пыли." },
                about: `
                    <h2>О ПРОЕКТЕ</h2>
                    <p>Я являюсь студентом группы <b>МЧМ-2024</b> и занимаюсь разработкой проекта, посвящённого инновационному методу очистки промышленных газов.</p>
                    <p><b>Технологическая цепочка:</b> Печь → Циклон → Рукавный фильтр → Скруббер → Плазменный реактор → Дымовая труба.</p>
                    <h3>Суть проекта</h3>
                    <p>Проект направлен на повышение эффективности очистки отходящих газов металлургических производств за счет многоступенчатой комбинированной системы.</p>
                    <h3>Показатели эффективности (КПД):</h3>
                    <ul>
                        <li><b>Циклон:</b> 70–90%</li>
                        <li><b>Рукавный фильтр:</b> до 99,5%</li>
                        <li><b>Скруббер:</b> 80–95%</li>
                        <li><b>Плазменный реактор:</b> до 98%</li>
                    </ul>
                    <p>Суммарная эффективность: <b>99,9%</b> по твердым частицам.</p>
                `
            },
            kz: {
                8: { t: "Пеш", d: "МЧМ-2024 металлургиялық пеші. Алғашқы ластану көзі." },
                9: { t: "Циклон", d: "Ірі шаң бөлшектерінен центробежді тазарту." },
                10: { t: "Жеңді сүзгі", d: "Ұсақ шаңды мата арқылы жұқа тазарту." },
                about: `
                    <h2>ЖОБА ТУРАЛЫ</h2>
                    <p>Мен <b>МЧМ-2024</b> тобының студентімін және өнеркәсіптік газдарды тазартудың инновациялық әдісіне арналған жобаны әзірлеумен айналысамын.</p>
                    <p><b>Технологиялық тізбек:</b> Пеш → Циклон → Жеңді сүзгі → Скруббер → Плазмалық реактор → Түтін мұржасы.</p>
                    <h3>Жобаның мақсаты</h3>
                    <p>Жоба металлургиялық өндірістердің шығарынды газдарын тазарту тиімділігін көп сатылы аралас жүйе арқылы арттыруға бағытталған.</p>
                `
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === lang));
            document.getElementById('about-text-content').innerHTML = content[lang].about;
            hideInfo();
        }

        function showData(id) {
            const item = content[currentLang][id];
            if(item) {
                document.getElementById('info-title').innerText = item.t;
                document.getElementById('info-text').innerText = item.d;
                document.getElementById('info-panel').classList.add('active');
            }
        }

        function hideInfo() { document.getElementById('info-panel').classList.remove('active'); }

        function toggleAbout() {
            const modal = document.getElementById('about-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleXray() {
            xrayEnabled = !xrayEnabled;
            const modelViewer = document.querySelector('#main-model');
            const materials = modelViewer.model.materials;

            materials.forEach(mat => {
                // ВАЖНО: Проверь имена материалов в Blender!
                if (mat.name.toLowerCase().includes('body') || mat.name.toLowerCase().includes('outer')) {
                    mat.setAlphaMode(xrayEnabled ? "BLEND" : "OPAQUE");
                    mat.pbrMetallicRoughness.setBaseColorFactor(xrayEnabled ? [1, 1, 1, 0.2] : [1, 1, 1, 1]);
                }
                if (mat.name.toLowerCase().includes('inner') || mat.name.toLowerCase().includes('glow')) {
                    mat.setEmissiveFactor(xrayEnabled ? [0, 0.7, 1] : [0, 0, 0]);
                }
            });

            const btn = document.getElementById('xray-btn');
            btn.classList.toggle('active', xrayEnabled);
            btn.innerText = xrayEnabled ? "Обычный вид" : "Рентген (X-Ray)";
        }

        // Инициализация текста при загрузке
        setLang('ru');
    </script>
</body>
</html>
