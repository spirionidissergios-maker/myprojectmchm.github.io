<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Технологии Газоочистки | Студент МЧМ-2024</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --accent: #00a8ff; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; color: white; overflow: hidden; }
        
        model-viewer { width: 100vw; height: 100vh; display: block; }

        /* Языки */
        .lang-switcher {
            position: absolute; top: 25px; right: 25px; z-index: 1000;
            display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 8px;
        }
        .lang-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 6px 14px; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent); border-color: var(--accent); }

        /* Инфо-панель хотспотов */
        #info-panel {
            position: absolute; top: 30px; left: 30px; width: 380px;
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px);
            border-left: 5px solid var(--accent); padding: 25px; border-radius: 0 12px 12px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); opacity: 0; transform: translateX(-30px);
            transition: 0.4s; pointer-events: none; z-index: 100;
        }
        #info-panel.active { opacity: 1; transform: translateX(0); }
        #info-panel h2 { margin: 0 0 12px 0; font-size: 20px; color: var(--accent); }
        #info-panel p { margin: 0; font-size: 15px; line-height: 1.7; color: #e0e0e0; }

        /* Кнопки управления */
        .bottom-controls { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 15px; z-index: 500; }
        .control-btn {
            background: rgba(0,0,0,0.7); border: 1px solid var(--accent);
            color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; font-weight: bold; letter-spacing: 1px;
        }
        .control-btn:hover { background: var(--accent); }
        .control-btn.active { background: #ff4500; border-color: #ff4500; }

        /* ОТДЕЛЬНАЯ СТРАНИЦА "О ПРОЕКТЕ" */
        #about-page {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #121212; z-index: 9999; display: none;
            overflow-y: auto; padding: 60px 20px; box-sizing: border-box;
        }
        .about-container { max-width: 900px; margin: 0 auto; }
        .about-container h1 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .about-container h2 { color: var(--accent); margin-top: 30px; }
        .about-container p, .about-container li { font-size: 17px; line-height: 1.8; color: #eee; }
        .about-container ul { padding-left: 20px; }
        .close-about { position: fixed; top: 25px; left: 25px; z-index: 10000; }

        /* Хотспоты */
        .Hotspot {
            background: var(--accent); border-radius: 50%; border: 2px solid #fff;
            width: 20px; height: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(0,168,255,0.6);
        }
        #ar-button { background: #fff; border-radius: 20px; border: none; padding: 12px 24px; position: absolute; bottom: 30px; right: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('kz')">KZ</button>
    </div>

    <div id="info-panel">
        <h2 id="info-title"></h2>
        <p id="info-text"></p>
    </div>

    <div id="about-page">
        <button class="control-btn close-about" onclick="toggleAbout()">← НАЗАД К МОДЕЛИ</button>
        <div class="about-container" id="about-content">
            </div>
    </div>

    <div class="bottom-controls">
        <button class="control-btn" onclick="toggleXray()" id="xray-btn">X-RAY РЕЖИМ</button>
        <button class="control-btn" onclick="toggleAbout()">О ПРОЕКТЕ</button>
    </div>

    <model-viewer id="main-model" src="my_model.glb" ar camera-controls shadow-intensity="2" auto-rotate>
        <button class="Hotspot" slot="hotspot-8" data-position="0.5644m 1.8532m 18.3852m" data-normal="0m 0m 1m" onmouseover="showData(8)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-9" data-position="11.1544m 4.0896m 14.5385m" data-normal="0.0958m -0.2075m 0.9735m" onmouseover="showData(9)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-10" data-position="22.2750m 4.0559m 17.3067m" data-normal="0m 0m 1m" onmouseover="showData(10)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-11" data-position="30.9266m 4.4094m 15.5866m" data-normal="-0.0980m 0m 0.9951m" onmouseover="showData(11)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-12" data-position="38.7348m 1.9256m 14.6947m" data-normal="-0.0157m -0.4366m 0.8994m" onmouseover="showData(12)" onmouseout="hideInfo()"></button>
        <button class="Hotspot" slot="hotspot-13" data-position="45.1935m 13.1032m 15.1441m" data-normal="-0.0979m 0.0204m 0.9949m" onmouseover="showData(13)" onmouseout="hideInfo()"></button>
        
        <button slot="ar-button" id="ar-button">AR РЕЖИМ</button>
    </model-viewer>

    <script>
        let currentLang = 'ru';
        let xrayEnabled = false;

        const content = {
            ru: {
                8: { t: "Металлургическая печь", d: "Основной теплотехнический агрегат, где происходит плавление металла. В процессе горения топлива и плавления сырья образуется сложная смесь дымовых газов, содержащая твердые взвеси, оксиды углерода и серы, требующая многоступенчатой очистки перед выбросом." },
                9: { t: "Циклонный сепаратор", d: "Первая ступень сухой очистки. Газовый поток закручивается внутри конуса; тяжелые частицы пыли под действием центробежной силы прижимаются к стенкам и оседают в бункере, а очищенный от крупной фракции газ уходит вверх." },
                10: { t: "Рукавный фильтр (Baghouse)", d: "Аппарат для тонкой механической очистки. Газ проходит сквозь тысячи тканевых рукавов, которые задерживают до 99.9% мелкодисперсной пыли. Оснащен системой импульсной регенерации (встряхивания) для автоматической очистки ткани." },
                11: { t: "Скруббер (Мокрая очистка)", d: "Аппарат, в котором газ промывается жидкостью (обычно водой или щелочным раствором). Эффективно удаляет не только остатки пыли, но и опасные газообразные примеси (SO2, HCl), охлаждая поток перед дальнейшей обработкой." },
                12: { t: "Плазменный реактор", d: "Инновационная установка финишной очистки. Высокоэнергетическая плазма разрушает молекулы токсичных органических соединений и диоксинов, превращая их в безопасные элементарные компоненты. Обеспечивает высочайший экологический стандарт." },
                13: { t: "Дымовая труба", d: "Финальное звено системы. Высотное сооружение создает естественную тягу и обеспечивает рассеивание полностью очищенного и охлажденного газа в верхних слоях атмосферы, исключая концентрацию вредных веществ у земли." },
                about: `
                    <h1>О ПРОЕКТЕ</h1>
                    <p>Я являюсь студентом группы <b>МЧМ-2024</b> и занимаюсь разработкой проекта, посвящённого инновационному методу очистки промышленных газов. В основе работы лежит комбинированная система газоочистки, включающая последовательность технологических узлов:</p>
                    <p style="text-align:center; color: #00a8ff; font-weight: bold;">Печь → Циклон → Рукавный фильтр → Скруббер → Плазменный реактор → Дымовая труба</p>
                    
                    <h2>Суть проекта</h2>
                    <p>Проект направлен на повышение эффективности очистки отходящих газов металлургических и других промышленных производств. В отличие от традиционных решений, где используется один или два метода очистки, предлагается многоступенчатая комбинированная система, в которой каждый элемент удаляет определённый тип загрязнений.</p>

                    <h2>Принцип работы системы</h2>
                    <ul>
                        <li><b>Циклон</b> — удаляет крупные твёрдые частицы (пыль, золу) за счёт центробежных сил</li>
                        <li><b>Рукавный фильтр</b> — улавливает мелкодисперсную пыль (до 1–5 мкм)</li>
                        <li><b>Скруббер</b> — очищает газ от растворимых газов и частично улавливает аэрозоли</li>
                        <li><b>Плазменный реактор</b> — разрушает токсичные газообразные соединения (NOx, SO₂, органические вещества) на молекулярном уровне</li>
                    </ul>

                    <h2>Почему комбинированный метод эффективнее</h2>
                    <p>Использование одного метода очистки обычно даёт ограниченный результат, так как разные загрязнители требуют разных физических и химических подходов. Комбинированная система позволяет:</p>
                    <ul>
                        <li>Поэтапно удалять загрязнения разной природы</li>
                        <li>Снижать нагрузку на каждый последующий аппарат</li>
                        <li>Достигать высокой степени очистки за счёт синергии методов</li>
                    </ul>

                    <h2>Количественные показатели эффективности</h2>
                    <p>По расчётам и данным аналогичных технологий:</p>
                    <ul>
                        <li><b>Циклон:</b> 70–90% удаления крупных частиц</li>
                        <li><b>Рукавный фильтр:</b> до 99–99,5% по мелкой пыли</li>
                        <li><b>Скруббер:</b> 80–95% по газовым загрязнителям</li>
                        <li><b>Плазменный реактор:</b> до 90–98% разложения токсичных газов</li>
                    </ul>
                    <p><b>Суммарная эффективность системы может достигать 99,9% по твёрдым частицам и более 95–98% по газообразным загрязнителям.</b></p>

                    <h2>Преимущества проекта</h2>
                    <ul>
                        <li>Существенное снижение выбросов в атмосферу</li>
                        <li>Соответствие современным экологическим стандартам</li>
                        <li>Универсальность (металлургия, энергетика, химия)</li>
                        <li>Повышение экологической безопасности производства</li>
                    </ul>
                `
            },
            kz: {
                // Здесь добавь свой текст для KZ версии хотспотов (8-13) и "About"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === lang));
            document.getElementById('about-content').innerHTML = content[lang].about;
        }

        function showData(id) {
            const item = content[currentLang][id];
            if(item) {
                document.getElementById('info-title').innerText = item.t;
                document.getElementById('info-text').innerText = item.d;
                document.getElementById('info-panel').classList.add('active');
            }
        }

        function hideInfo() { document.getElementById('info-panel').classList.remove('active'); }

        function toggleAbout() {
            const page = document.getElementById('about-page');
            page.style.display = (page.style.display === 'block') ? 'none' : 'block';
        }

        function toggleXray() {
            xrayEnabled = !xrayEnabled;
            const modelViewer = document.querySelector('#main-model');
            const materials = modelViewer.model.materials;
            materials.forEach(mat => {
                // Условие срабатывает, если в названии материала есть 'body' или 'outer'
                if (mat.name.toLowerCase().includes('body') || mat.name.toLowerCase().includes('outer')) {
                    mat.setAlphaMode(xrayEnabled ? "BLEND" : "OPAQUE");
                    mat.pbrMetallicRoughness.setBaseColorFactor(xrayEnabled ? [1, 1, 1, 0.2] : [1, 1, 1, 1]);
                }
                // Внутренности начинают светиться при X-Ray
                if (mat.name.toLowerCase().includes('inner') || mat.name.toLowerCase().includes('glow')) {
                    mat.setEmissiveFactor(xrayEnabled ? [0, 0.6, 1] : [0, 0, 0]);
                }
            });
            const btn = document.getElementById('xray-btn');
            btn.classList.toggle('active', xrayEnabled);
            btn.innerText = xrayEnabled ? "ОБЫЧНЫЙ ВИД" : "X-RAY РЕЖИМ";
        }

        setLang('ru');
    </script>
</body>
</html>
