<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Технологии Газоочистки</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --accent: #00a8ff; 
            --panel-bg: rgba(20, 20, 20, 0.9);
        }
        body { margin: 0; background: #0a0a0a; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: white; }
        
        model-viewer { width: 100vw; height: 100vh; background-color: #0a0a0a; --progress-bar-color: var(--accent); }

        /* Индикатор загрузки */
        #progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); position: absolute; top: 0; left: 0; z-index: 1000; }
        #update-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        /* Переключатель языков */
        .lang-switcher {
            position: absolute; top: 25px; right: 25px; z-index: 100;
            display: flex; gap: 8px; background: rgba(0,0,0,0.6);
            padding: 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        }

        .lang-btn {
            background: transparent; border: 1px solid transparent; color: #aaa;
            padding: 6px 14px; cursor: pointer; border-radius: 6px;
            font-size: 13px; font-weight: bold; transition: 0.3s;
        }

        .lang-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 168, 255, 0.4); }

        /* Инфо-панель */
        #info-panel {
            position: absolute; top: 30px; left: 30px; width: 360px;
            background: linear-gradient(135deg, rgba(25,25,25,0.95) 0%, rgba(10,10,10,0.98) 100%);
            backdrop-filter: blur(20px); border-left: 4px solid var(--accent);
            padding: 30px; border-radius: 0 15px 15px 0;
            box-shadow: 25px 0 50px rgba(0,0,0,0.6);
            opacity: 0; transform: translateX(-40px);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: none; z-index: 10;
        }

        #info-panel.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        
        #info-panel h2 { 
            margin: 0 0 15px 0; font-size: 22px; letter-spacing: 0.5px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        #info-panel p { margin: 0; font-size: 15px; line-height: 1.6; color: #ccc; text-align: left; }

        /* Кнопка сброса */
        #reset-btn {
            position: absolute; bottom: 30px; left: 30px; z-index: 100;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;
            backdrop-filter: blur(5px); transition: 0.3s; font-size: 12px;
        }
        #reset-btn:hover { background: rgba(255,255,255,0.15); border-color: white; }

        /* Хотспоты с пульсацией */
        .Hotspot {
            background: var(--accent); border-radius: 50%; border: 2px solid #fff;
            width: 16px; height: 16px; cursor: pointer; position: relative; transition: 0.3s;
        }
        
        .Hotspot::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 100%; height: 100%; border-radius: 50%;
            background: var(--accent); transform: translate(-50%, -50%);
            animation: pulse 2s infinite; z-index: -1;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
        }

        .Hotspot:hover { transform: scale(1.4); background: #fff; }

        #ar-button { 
            background: var(--accent); border-radius: 30px; border: none; 
            padding: 15px 30px; position: absolute; bottom: 30px; right: 30px; 
            font-weight: bold; cursor: pointer; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="progress-bar" slot="progress-bar">
        <div id="update-bar"></div>
    </div>

    <div class="lang-switcher">
        <button id="btn-ru" class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button id="btn-kz" class="lang-btn" onclick="setLang('kz')">KZ</button>
    </div>

    <div id="info-panel">
        <h2 id="info-title">Загрузка...</h2>
        <p id="info-text">Выберите объект на модели для просмотра подробных характеристик.</p>
    </div>

    <button id="reset-btn" onclick="resetCamera()">СБРОСИТЬ ВИД</button>

    <model-viewer 
        id="viewer"
        src="my_model.glb" 
        ar 
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1" 
        auto-rotate
        exposure="1"
        camera-orbit="auto auto auto"
        interaction-prompt="none">

        <button class="Hotspot" slot="hotspot-8" data-position="0.5644m 1.8532m 18.3852m" data-normal="0m 0m 1m" onclick="showData(8)"></button>
        <button class="Hotspot" slot="hotspot-9" data-position="11.1544m 4.0896m 14.5385m" data-normal="0.0958m -0.2075m 0.9735m" onclick="showData(9)"></button>
        <button class="Hotspot" slot="hotspot-10" data-position="22.2750m 4.0559m 17.3067m" data-normal="0m 0m 1m" onclick="showData(10)"></button>
        <button class="Hotspot" slot="hotspot-11" data-position="30.9266m 4.4094m 15.5866m" data-normal="-0.0980m 0m 0.9951m" onclick="showData(11)"></button>
        <button class="Hotspot" slot="hotspot-12" data-position="38.7348m 1.9256m 14.6947m" data-normal="-0.0157m -0.4366m 0.8994m" onclick="showData(12)"></button>
        <button class="Hotspot" slot="hotspot-13" data-position="45.1935m 13.1032m 15.1441m" data-normal="-0.0979m 0.0204m 0.9949m" onclick="showData(13)"></button>

        <button slot="ar-button" id="ar-button">AR РЕЖИМ</button>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        const progressBar = document.getElementById('update-bar');
        
        // Индикатор загрузки
        viewer.addEventListener('progress', (event) => {
            progressBar.style.width = event.detail.totalProgress * 100 + '%';
            if (event.detail.totalProgress === 1) {
                setTimeout(() => { document.getElementById('progress-bar').style.display = 'none'; }, 500);
            }
        });

        let currentLang = 'ru';
        const content = {
            ru: {
                8: { t: "Металлургическая печь", d: "Основной теплотехнический агрегат, где происходит плавление металла. В процессе горения топлива и плавления сырья образуется сложная смесь дымовых газов, содержащая твердые взвеси, оксиды углерода и серы, требующая многоступенчатой очистки перед выбросом." },
                9: { t: "Циклонный сепаратор", d: "Первая ступень сухой очистки. Газовый поток закручивается внутри конуса; тяжелые частицы пыли под действием центробежной силы прижимаются к стенкам и оседают в бункере, а очищенный от крупной фракции газ уходит вверх." },
                10: { t: "Рукавный фильтр (Baghouse)", d: "Аппарат для тонкой механической очистки. Газ проходит сквозь тысячи тканевых рукавов, которые задерживают до 99.9% мелкодисперсной пыли. Оснащен системой импульсной регенерации (встряхивания) для автоматической очистки ткани." },
                11: { t: "Скруббер (Мокрая очистка)", d: "Аппарат, в котором газ промывается жидкостью (обычно водой или щелочным раствором). Эффективно удаляет не только остатки пыли, но и опасные газообразные примеси (SO2, HCl), охлаждая поток перед дальнейшей обработкой." },
                12: { t: "Плазменный реактор", d: "Инновационная установка финишной очистки. Высокоэнергетическая плазма разрушает молекулы токсичных органических соединений и диоксинов, превращая их в безопасные элементарные компоненты. Обеспечивает высочайший экологический стандарт." },
                13: { t: "Дымовая труба", d: "Финальное звено системы. Высотное сооружение создает естественную тягу и обеспечивает рассеивание полностью очищенного и охлажденного газа в верхних слоях атмосферы, исключая концентрацию вредных веществ у земли." }
            },
            kz: {
                8: { t: "Металлургиялық пеш", d: "Металл балқытылатын негізгі жылу техникалық агрегат. Отынның жануы және шикізаттың балқуы кезінде қатты қоспалары, көміртегі және күкірт оксидтері бар түтін газдарының күрделі қоспасы түзіледі, ол шығарылмас бұрын көп сатылы тазартуды қажет етеді." },
                9: { t: "Циклондық сепаратор", d: "Құрғақ тазартудың бірінші сатысы. Газ ағыны конус ішінде иіріледі; шаңның ауыр бөлшектері ортадан тепкіш күштің әсерімен қабырғаларға қысылып, бункерге шөгеді, ал ірі фракциядан тазартылған газ жоғары қарай кетеді." },
                10: { t: "Жеңді сүзгі (Baghouse)", d: "Жұқа механикалық тазарту аппараты. Газ мыңдаған мата жеңдер арқылы өтеді, олар ұсақ шаңның 99.9%-на дейін ұстап қалады. Матаны автоматты түрде тазарту үшін импульстік регенерация (сілку) жүйесімен жабдықталған." },
                11: { t: "Скруббер (Дымқыл тазарту)", d: "Газ сұйықтықпен (әдетте сумен немесе сілтілі ерітіндімен) жуылатын аппарат. Шаң қалдықтарын ғана емес, сонымен қатар қауіпті газ тәрізді қоспаларды (SO2, HCl) тиімді түрде жояды, ағынды одан әрі өңдеу алдында суытады." },
                12: { t: "Плазмалық реактор", d: "Фиништік тазартудың инновациялық қондырғысы. Жоғары энергиялы плазма улы органикалық қосылыстар мен диоксиндердің молекулаларын бұзып, оларды қауіпсіз элементарлы компоненттерге айналдырады. Ең жоғары экологиялық стандартты қамтамасыз етеді." },
                13: { t: "Түтін мұржасы", d: "Жүйенің соңғы буыны. Биік құрылыс табиғи тартымды тудырады және толық тазартылған әрі суытылған газдың атмосфераның жоғарғы қабаттарына таралуын қамтамасыз етеді, бұл зиянды заттардың жерге жақын жиналуын болдырмайды." }
            }
        };

        const panel = document.getElementById('info-panel');
        const title = document.getElementById('info-title');
        const text = document.getElementById('info-text');

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('btn-kz').classList.toggle('active', lang === 'kz');
            panel.classList.remove('active');
        }

        function showData(id) {
            const item = content[currentLang][id];
            title.innerText = item.t;
            text.innerText = item.d;
            panel.classList.add('active');

            // Зум к объекту
            const hs = document.querySelector(`button[slot="hotspot-${id}"]`);
            viewer.cameraTarget = hs.dataset.position;
            viewer.cameraOrbit = "45deg 75deg 10m"; 
        }

        function resetCamera() {
            panel.classList.remove('active');
            viewer.cameraTarget = "auto auto auto";
            viewer.cameraOrbit = "auto auto auto";
        }

        // Закрытие панели при клике на модель (пустое место)
        viewer.addEventListener('click', (event) => {
            if (event.target.classList.contains('Hotspot')) return;
            panel.classList.remove('active');
        });
    </script>
</body>
</html>
